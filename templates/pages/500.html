{% extends 'index.html' %}
{% load static %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="container-xxl py-5 wow fadeInUp" data-wow-delay="0.1s">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <i class="bi bi-exclamation-triangle display-1 text-primary"></i>
                    <h1 class="display-1">500</h1>
                    <h1 class="mb-4">Internal Server Error</h1>
                    <p class="mb-4">Something went wrong on our side. Our technicians (from CarServ!) are already working on it.</p>
                    <a class="btn btn-primary rounded-pill py-3 px-5" href="{% url 'home:home' %}">Go Back To Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
